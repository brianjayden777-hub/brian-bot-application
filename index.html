<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brian Bot App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    text-align: center;
    margin: 0;
}

header {
    background: #00ff88;
    color: black;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

button {
    width: 90%;
    padding: 15px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00ff88;
    cursor: pointer;
}

button:hover {
    background: #00cc6a;
}

.section {
    display: none;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 80%;
    margin: 5px;
}
</style>

</head>

<body>

<header>
Brian Bot Application
</header>

<div class="container">

<button onclick="showSection('ai')">
🤖 AI Chat
</button>

<button onclick="showSection('weather')">
🌤 Weather
</button>

<button onclick="showSection('reminder')">
⏰ Reminders
</button>

<!-- AI SECTION -->
<div id="ai" class="section">

<h2>AI Chat</h2>

<input id="userInput" placeholder="Type message...">

<button onclick="sendMessage()">
Send
</button>

<p id="aiResponse"></p>

</div>

<!-- WEATHER SECTION -->
<div id="weather" class="section">

<h2>Weather</h2>

<input id="city" placeholder="Enter city">

<button onclick="getWeather()">
Get Weather
</button>

<p id="weatherResult"></p>

</div>

<!-- REMINDER SECTION -->
<div id="reminder" class="section">

<h2>Reminders</h2>

<input id="reminderText" placeholder="Enter reminder">

<button onclick="addReminder()">
Add Reminder
</button>

<ul id="reminderList"></ul>

</div>

</div>

<script>

function showSection(id) {

let sections = document.querySelectorAll(".section");

sections.forEach(sec => sec.style.display = "none");

document.getElementById(id).style.display = "block";

}

/* AI (Temporary Simple Reply) */

function sendMessage() {

let input =
document.getElementById("userInput").value;

document.getElementById("aiResponse").innerText =
"You said: " + input;

}

/* Weather (placeholder) */

function getWeather() {

let city =
document.getElementById("city").value;

document.getElementById("weatherResult").innerText =
"Weather feature coming soon for " + city;

}

/* Reminders */

function addReminder() {

let text =
document.getElementById("reminderText").value;

let li = document.createElement("li");

li.textContent = text;

document.getElementById("reminderList").appendChild(li);

}

</script>

</body>
</html><!DOCTYPE html>
<html>
<head>

<title>Brian Bot App</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="manifest"
href="manifest.json">

<meta name="theme-color"
content="#00ff88">

<style>

body {
font-family: Arial;
background: black;
color: #00ff88;
text-align: center;
}

#chat {
width: 90%;
height: 300px;
border: 1px solid #00ff88;
margin: auto;
overflow-y: scroll;
padding: 10px;
}

input {
width: 70%;
padding: 10px;
}

button {
padding: 10px;
background: #00ff88;
border: none;
margin: 5px;
}

</style>

</head>

<body>

<h1>🤖 Brian Bot</h1>

<div id="chat"></div>

<input
id="userInput"
placeholder="Type message">

<button onclick="sendMessage()">
Send
</button>

<br><br>

<button onclick="getWeather()">
Weather
</button>

<button onclick="setReminder()">
Reminder
</button>

<script>

function sendMessage(){

let input =
document.getElementById("userInput").value;

let chat =
document.getElementById("chat");

chat.innerHTML +=
"<p>You: " + input + "</p>";

chat.innerHTML +=
"<p>Bot: Hello! I'm Brian Bot.</p>";

}

function getWeather(){

alert("Weather coming soon");

}

function setReminder(){

let seconds =
prompt("Reminder in seconds:");

setTimeout(() => {

alert("Reminder time!");

}, seconds * 1000);

}

if ("serviceWorker" in navigator) {

navigator.serviceWorker
.register("service-worker.js");

}

</script>

</body>
</html>
