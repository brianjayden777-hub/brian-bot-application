<!DOCTYPE html>
<html>
<head>

<title>Brian Bot App</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="manifest"
href="manifest.json">

<meta name="theme-color"
content="#00ff88">

<style>

body {
font-family: Arial;
background: black;
color: #00ff88;
text-align: center;
}

#chat {
width: 90%;
height: 300px;
border: 1px solid #00ff88;
margin: auto;
overflow-y: scroll;
padding: 10px;
}

input {
width: 70%;
padding: 10px;
}

button {
padding: 10px;
background: #00ff88;
border: none;
margin: 5px;
}

</style>

</head>

<body>

<h1>🤖 Brian Bot</h1>

<div id="chat"></div>

<input
id="userInput"
placeholder="Type message">

<button onclick="sendMessage()">
Send
</button>

<br><br>

<button onclick="getWeather()">
Weather
</button>

<button onclick="setReminder()">
Reminder
</button>

<script>

function sendMessage(){

let input =
document.getElementById("userInput").value;

let chat =
document.getElementById("chat");

chat.innerHTML +=
"<p>You: " + input + "</p>";

chat.innerHTML +=
"<p>Bot: Hello! I'm Brian Bot.</p>";

}

function getWeather(){

alert("Weather coming soon");

}

function setReminder(){

let seconds =
prompt("Reminder in seconds:");

setTimeout(() => {

alert("Reminder time!");

}, seconds * 1000);

}

if ("serviceWorker" in navigator) {

navigator.serviceWorker
.register("service-worker.js");

}

</script>

</body>
</html>
